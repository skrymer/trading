services:
  postgres:
    image: postgres:17
    container_name: trading-postgres
    restart: always
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
    ports:
      - "5432:5432"
    volumes:
      - trading-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading && pg_isready -U trading -d datastore"]
      interval: 5s
      timeout: 5s
      retries: 5

  midgaard:
    build:
      context: ../midgaard
      dockerfile: Dockerfile
    container_name: midgaard-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/datastore
      SPRING_DATASOURCE_USERNAME: trading
      SPRING_DATASOURCE_PASSWORD: trading
      APP_SECURITY_ENABLED: "false"
      APP_UI_ENABLED: "true"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer
    restart: always
    ports:
      - "8083:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  trading-data:
