name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Needed by the test-reporter to publish a check run + annotate failing tests in the PR diff.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    # Postgres for compile-time jOOQ codegen + Flyway migrations (build.gradle points at
    # localhost:5432/trading). The TestContainers E2E suite spins up its own Postgres via the
    # runner's Docker and overrides the datasource at runtime — independent of this service.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: trading
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make gradlew executable
        working-directory: udgaard
        run: chmod +x gradlew

      - name: Initialize database (Flyway migrations for jOOQ codegen)
        working-directory: udgaard
        run: ./gradlew initDatabase --no-daemon

      - name: Run backend tests
        working-directory: udgaard
        run: ./gradlew test --no-daemon

      - name: Publish backend test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'udgaard/build/test-results/test/*.xml'
          check_name: Backend Test Report
          detailed_summary: true

      - name: Build backend JAR
        working-directory: udgaard
        run: ./gradlew bootJar --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: udgaard/build/test-results/
          retention-days: 7

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-build-reports
          path: udgaard/build/reports/
          retention-days: 7

  midgaard-test:
    name: Midgaard Tests
    runs-on: ubuntu-latest

    # Postgres for Midgaard's compile-time jOOQ codegen + Flyway migrations
    # (build.gradle points at localhost:5433/datastore). E2E tests use TestContainers.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: datastore
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make gradlew executable
        working-directory: midgaard
        run: chmod +x gradlew

      - name: Initialize database (Flyway migrations for jOOQ codegen)
        working-directory: midgaard
        run: ./gradlew initDatabase --no-daemon

      - name: Run midgaard tests
        working-directory: midgaard
        run: ./gradlew test --no-daemon

      - name: Publish midgaard test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'midgaard/build/test-results/test/*.xml'
          check_name: Midgaard Test Report
          detailed_summary: true

      - name: Build midgaard JAR
        working-directory: midgaard
        run: ./gradlew bootJar --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: midgaard-test-results
          path: midgaard/build/test-results/
          retention-days: 7

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: midgaard-build-reports
          path: midgaard/build/reports/
          retention-days: 7

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: asgaard
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type checking
        working-directory: asgaard
        run: pnpm run typecheck

      - name: Run ESLint
        working-directory: asgaard
        run: pnpm run lint

      - name: Build frontend
        working-directory: asgaard
        run: pnpm run build

  integration-test:
    name: Integration Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    # Postgres for the udgaard backend JAR build (bootJar triggers jOOQ codegen against
    # localhost:5432/trading via build.gradle).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: trading
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make gradlew executable
        working-directory: udgaard
        run: chmod +x gradlew

      - name: Initialize database (Flyway migrations for jOOQ codegen)
        working-directory: udgaard
        run: ./gradlew initDatabase --no-daemon

      - name: Build complete application
        run: pnpm run build:all

      - name: Verify JAR exists
        run: |
          if [ ! -f udgaard/build/libs/udgaard-*.jar ]; then
            echo "Backend JAR not found!"
            exit 1
          fi
          echo "Backend JAR built successfully"

      - name: Verify frontend build exists
        run: |
          if [ ! -d asgaard/.output ]; then
            echo "Frontend build not found!"
            exit 1
          fi
          echo "Frontend build completed successfully"

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    # Postgres for compile-time jOOQ codegen (compileKotlin triggers generateJooq →
    # flywayMigrate against localhost:5432/trading).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: trading
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make gradlew executable
        working-directory: udgaard
        run: chmod +x gradlew

      - name: Initialize database (Flyway migrations for jOOQ codegen)
        working-directory: udgaard
        run: ./gradlew initDatabase --no-daemon

      - name: Run Kotlin compilation check
        working-directory: udgaard
        run: ./gradlew compileKotlin --no-daemon

      - name: Check for Kotlin code style (optional)
        working-directory: udgaard
        run: ./gradlew classes --no-daemon
        continue-on-error: true
